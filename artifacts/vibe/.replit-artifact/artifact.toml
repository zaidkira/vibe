kind = "web"
previewPath = "/"
title = "VIBE Restaurant"
version = "1.0.0"
id = "artifacts/vibe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22905

[services.development]
run = "pnpm --filter @workspace/vibe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibe", "run", "build" ]
publicDir = "artifacts/vibe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22905"
BASE_PATH = "/"
